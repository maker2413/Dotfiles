  - fastfetch
  - fish
  - flatpak
  - fluxcd
  - ghostty
  - git
  - google-cloud-cli
  - google-cloud-cli-gke-gcloud-auth-plugin
  - helm
  - htop
  - ispell
  - k9s
  - kubectl
  - kubectx
  - man-db
  - minikube
